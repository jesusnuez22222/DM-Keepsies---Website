<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – DM Keepsies Orders</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --rose: #C4526B; --rose-deep: #A33D57; --blush: #FDE8F0; --blush-lite: #FDF5F7;
      --white: #FFFFFF; --gray-text: #6B5A60; --dark: #2C2022;
      --radius-sm: 8px; --radius-md: 16px; --radius-pill: 999px;
      --shadow-card: 0 4px 24px rgba(196,82,107,.12);
    }
    body { font-family: 'Montserrat', sans-serif; background: #f4f4f6; color: var(--dark); min-height: 100vh; }

    /* LOGIN */
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--blush-lite); }
    .login-card { background: var(--white); border-radius: var(--radius-md); padding: 48px 40px; box-shadow: var(--shadow-card); text-align: center; width: 100%; max-width: 380px; }
    .login-card img { height: 64px; margin: 0 auto 20px; background: var(--blush-lite); padding: 6px 12px; border-radius: var(--radius-sm); }
    .login-card h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 6px; }
    .login-card p { font-size: .85rem; color: var(--gray-text); margin-bottom: 28px; }
    .login-input { width: 100%; padding: 13px 16px; border: 1.5px solid rgba(196,82,107,.2); border-radius: var(--radius-sm); font-family: 'Montserrat', sans-serif; font-size: .9rem; outline: none; margin-bottom: 14px; transition: border-color .3s; }
    .login-input:focus { border-color: var(--rose); box-shadow: 0 0 0 3px rgba(196,82,107,.1); }
    .login-btn { width: 100%; padding: 14px; background: var(--rose); color: var(--white); border: none; border-radius: var(--radius-pill); font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: .95rem; cursor: pointer; transition: background .3s; }
    .login-btn:hover { background: var(--rose-deep); }
    .login-error { color: #e53e3e; font-size: .82rem; margin-top: 10px; min-height: 18px; }

    /* ADMIN LAYOUT */
    .admin-wrap { display: none; }
    .admin-header { background: var(--white); border-bottom: 1px solid rgba(196,82,107,.1); padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 64px; box-shadow: 0 2px 8px rgba(0,0,0,.04); }
    .admin-header-left { display: flex; align-items: center; gap: 16px; }
    .admin-logo { height: 44px; background: var(--blush-lite); padding: 4px 10px; border-radius: 6px; }
    .admin-title { font-size: 1rem; font-weight: 700; color: var(--dark); }
    .admin-title span { color: var(--rose); }
    .logout-btn { padding: 8px 18px; background: none; border: 1.5px solid rgba(196,82,107,.25); border-radius: var(--radius-pill); font-family: 'Montserrat', sans-serif; font-size: .82rem; font-weight: 600; color: var(--rose); cursor: pointer; transition: all .3s; }
    .logout-btn:hover { background: var(--rose); color: var(--white); }

    .admin-body { max-width: 1200px; margin: 0 auto; padding: 36px 24px; }

    /* STATS */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 36px; }
    .stat-card { background: var(--white); border-radius: var(--radius-md); padding: 24px 20px; box-shadow: var(--shadow-card); }
    .stat-label { font-size: .78rem; font-weight: 600; color: var(--gray-text); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
    .stat-value { font-size: 1.8rem; font-weight: 700; color: var(--rose); line-height: 1; }
    .stat-sub { font-size: .78rem; color: var(--gray-text); margin-top: 4px; }

    /* TABLE */
    .table-card { background: var(--white); border-radius: var(--radius-md); box-shadow: var(--shadow-card); overflow: hidden; }
    .table-header { padding: 20px 24px; border-bottom: 1px solid rgba(196,82,107,.08); display: flex; align-items: center; justify-content: space-between; }
    .table-header h2 { font-size: 1rem; font-weight: 700; }
    .refresh-btn { padding: 8px 16px; background: var(--blush); border: none; border-radius: var(--radius-pill); font-family: 'Montserrat', sans-serif; font-size: .82rem; font-weight: 600; color: var(--rose); cursor: pointer; transition: background .3s; }
    .refresh-btn:hover { background: var(--rose); color: var(--white); }

    table { width: 100%; border-collapse: collapse; }
    thead th { background: var(--blush-lite); padding: 12px 16px; font-size: .78rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--gray-text); text-align: left; }
    tbody tr { border-bottom: 1px solid rgba(196,82,107,.06); transition: background .2s; cursor: pointer; }
    tbody tr:hover { background: var(--blush-lite); }
    tbody tr:last-child { border-bottom: none; }
    td { padding: 14px 16px; font-size: .88rem; vertical-align: middle; }
    .order-id { font-family: monospace; font-size: .78rem; color: var(--gray-text); }
    .status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: var(--radius-pill); font-size: .72rem; font-weight: 700; background: #d4edda; color: #155724; }

    /* EMPTY / LOADING */
    .table-loading { text-align: center; padding: 48px 24px; color: var(--gray-text); }
    .table-loading .spinner { width: 32px; height: 32px; border: 3px solid var(--blush); border-top-color: var(--rose); border-radius: 50%; animation: spin .6s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200; align-items: center; justify-content: center; padding: 24px; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--white); border-radius: var(--radius-md); padding: 32px; max-width: 540px; width: 100%; max-height: 80vh; overflow-y: auto; }
    .modal h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; }
    .modal-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(196,82,107,.07); font-size: .88rem; }
    .modal-row:last-child { border-bottom: none; }
    .modal-row span:first-child { color: var(--gray-text); font-weight: 500; }
    .modal-row span:last-child { font-weight: 600; text-align: right; max-width: 60%; }
    .modal-close { margin-top: 24px; width: 100%; padding: 12px; background: var(--rose); color: var(--white); border: none; border-radius: var(--radius-pill); font-family: 'Montserrat', sans-serif; font-weight: 700; cursor: pointer; }
    .modal-close:hover { background: var(--rose-deep); }
    .items-list { margin-top: 4px; }
    .item-row { background: var(--blush-lite); border-radius: 6px; padding: 8px 12px; margin-bottom: 6px; font-size: .82rem; display: flex; justify-content: space-between; }

    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .admin-header { padding: 0 16px; }
      table { font-size: .78rem; }
      td, thead th { padding: 10px 10px; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-wrap" id="loginWrap">
    <div class="login-card">
      <img src="brand_assets/616814509_4232158440434450_2719695261011975037_n.jpg" alt="DM Keepsies" />
      <h2>Admin Dashboard</h2>
      <p>Sign in to manage your orders</p>
      <input class="login-input" type="password" id="passwordInput" placeholder="Enter admin password" />
      <button class="login-btn" onclick="login()">Sign In</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>

  <!-- ADMIN -->
  <div class="admin-wrap" id="adminWrap">

    <header class="admin-header">
      <div class="admin-header-left">
        <img class="admin-logo" src="brand_assets/616814509_4232158440434450_2719695261011975037_n.jpg" alt="DM Keepsies" />
        <span class="admin-title">DM Keepsies · <span>Orders</span></span>
      </div>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </header>

    <div class="admin-body">

      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <div class="stat-label">Total Orders</div>
          <div class="stat-value" id="statTotal">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Revenue</div>
          <div class="stat-value" id="statRevenue">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Today's Orders</div>
          <div class="stat-value" id="statToday">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Avg. Order Value</div>
          <div class="stat-value" id="statAvg">—</div>
        </div>
      </div>

      <div class="table-card">
        <div class="table-header">
          <h2>All Orders</h2>
          <button class="refresh-btn" onclick="loadOrders()">↻ Refresh</button>
        </div>

        <div id="tableBody">
          <div class="table-loading">
            <div class="spinner"></div>
            <p>Loading orders...</p>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ORDER DETAIL MODAL -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" id="modalContent">
      <h3>Order Details</h3>
      <div id="modalBody"></div>
      <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('open')">Close</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://boxudirhejtzklnpnxfw.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_j9kJoHJXwKXQcXY-ginFKQ_p5eilcPr';
    const ADMIN_PASSWORD = 'dmkeepsies2026';

    const { createClient } = supabase;
    const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    // AUTH
    function login() {
      const pw = document.getElementById('passwordInput').value;
      if (pw === ADMIN_PASSWORD) {
        sessionStorage.setItem('dmk_admin', '1');
        document.getElementById('loginWrap').style.display = 'none';
        document.getElementById('adminWrap').style.display = 'block';
        loadOrders();
      } else {
        document.getElementById('loginError').textContent = 'Incorrect password. Try again.';
      }
    }

    function logout() {
      sessionStorage.removeItem('dmk_admin');
      document.getElementById('loginWrap').style.display = 'flex';
      document.getElementById('adminWrap').style.display = 'none';
      document.getElementById('passwordInput').value = '';
    }

    document.getElementById('passwordInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });

    // Auto-login if session exists
    if (sessionStorage.getItem('dmk_admin')) {
      document.getElementById('loginWrap').style.display = 'none';
      document.getElementById('adminWrap').style.display = 'block';
      loadOrders();
    }

    // LOAD ORDERS
    async function loadOrders() {
      document.getElementById('tableBody').innerHTML = `
        <div class="table-loading"><div class="spinner"></div><p>Loading orders...</p></div>
      `;

      const { data: orders, error } = await _supabase
        .from('orders')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        document.getElementById('tableBody').innerHTML =
          `<div class="table-loading"><p style="color:#e53e3e">Error: ${error.message}</p></div>`;
        return;
      }

      updateStats(orders);

      if (orders.length === 0) {
        document.getElementById('tableBody').innerHTML =
          `<div class="table-loading"><p>No orders yet. Share the website to start getting orders! 🎀</p></div>`;
        return;
      }

      document.getElementById('tableBody').innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Order ID</th>
              <th>Customer</th>
              <th>Email</th>
              <th>Items</th>
              <th>Total</th>
              <th>Status</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody>
            ${orders.map(o => `
              <tr onclick="showOrder('${o.id}')">
                <td class="order-id">${o.id.slice(0,8)}...</td>
                <td><strong>${o.customer_name}</strong></td>
                <td>${o.customer_email}</td>
                <td>${JSON.parse(typeof o.items === 'string' ? o.items : JSON.stringify(o.items)).length} item(s)</td>
                <td><strong style="color:var(--rose)">₱${Number(o.total_amount).toLocaleString()}</strong></td>
                <td><span class="status-badge">✓ ${o.status}</span></td>
                <td>${new Date(o.created_at).toLocaleDateString('en-PH', { month:'short', day:'numeric', year:'numeric' })}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;

      window._orders = orders;
    }

    function updateStats(orders) {
      const total = orders.length;
      const revenue = orders.reduce((s, o) => s + Number(o.total_amount), 0);
      const today = orders.filter(o => new Date(o.created_at).toDateString() === new Date().toDateString()).length;
      const avg = total > 0 ? revenue / total : 0;

      document.getElementById('statTotal').textContent = total;
      document.getElementById('statRevenue').textContent = '₱' + revenue.toLocaleString();
      document.getElementById('statToday').textContent = today;
      document.getElementById('statAvg').textContent = '₱' + avg.toFixed(0);
    }

    function showOrder(id) {
      const o = window._orders.find(x => x.id === id);
      if (!o) return;
      const items = typeof o.items === 'string' ? JSON.parse(o.items) : o.items;

      document.getElementById('modalBody').innerHTML = `
        <div class="modal-row"><span>Order ID</span><span class="order-id">${o.id}</span></div>
        <div class="modal-row"><span>Customer</span><span>${o.customer_name}</span></div>
        <div class="modal-row"><span>Email</span><span>${o.customer_email}</span></div>
        <div class="modal-row"><span>Date</span><span>${new Date(o.created_at).toLocaleString('en-PH')}</span></div>
        <div class="modal-row"><span>Status</span><span><span class="status-badge">✓ ${o.status}</span></span></div>
        <div class="modal-row"><span>Stripe ID</span><span class="order-id">${o.stripe_payment_id || 'N/A'}</span></div>
        <div class="modal-row"><span>Notes</span><span>${o.order_notes || '—'}</span></div>
        <div class="modal-row" style="flex-direction:column;gap:8px">
          <span>Items Ordered:</span>
          <div class="items-list">
            ${items.map(i => `
              <div class="item-row">
                <span>${i.name} ×${i.quantity}</span>
                <span>₱${(i.price * i.quantity).toLocaleString()}</span>
              </div>
            `).join('')}
          </div>
        </div>
        <div class="modal-row" style="border-top:2px solid var(--rose);margin-top:8px;padding-top:12px">
          <span style="font-weight:700">Total Paid</span>
          <span style="color:var(--rose);font-size:1.1rem">₱${Number(o.total_amount).toLocaleString()}</span>
        </div>
      `;
      document.getElementById('modalOverlay').classList.add('open');
    }

    function closeModal(e) {
      if (e.target === document.getElementById('modalOverlay')) {
        document.getElementById('modalOverlay').classList.remove('open');
      }
    }
  </script>
</body>
</html>
